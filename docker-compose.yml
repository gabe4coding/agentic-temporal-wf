services:
  temporal:
    image: temporalio/auto-setup:1.24
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    depends_on:
      - postgres
    ports:
      - "7233:7233"
    volumes:
      - ./temporal-dynamicconfig.yaml:/etc/temporal/config/dynamicconfig/docker.yaml:ro

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_USER=temporal
    volumes:
      - temporal_pg:/var/lib/postgresql/data

  temporal-ui:
    image: temporalio/ui:2.30.1
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      - temporal
    ports:
      - "8233:8080"

  sandbox-image:
    # One-shot service that builds the per-workflow sandbox image. The
    # worker spawns sibling containers from this image via the mounted
    # docker.sock; it does NOT run the image itself.
    # Context is the repo root so the Dockerfile can COPY src/ and
    # plugins/ which live above sandbox/.
    build:
      context: .
      dockerfile: sandbox/Dockerfile
    image: agent-sandbox:latest
    entrypoint: ["true"]
    restart: "no"

  capability-broker:
    # Trusted model relay and remote MCP server. Holds upstream
    # credentials; sandboxes receive only opaque per-run capabilities.
    build:
      context: .
      dockerfile: src/proxy/Dockerfile
    env_file: .env
    environment:
      - CAPABILITY_BROKER_BOOT=1
      - TEMPORAL_TARGET=temporal:7233
      - BROKER_REGISTRATION_SECRET=${BROKER_REGISTRATION_SECRET}
    networks:
      - sandbox-net
      - default
    restart: unless-stopped

  otel-collector:
    # OpenTelemetry Collector (contrib build). Sits between the claude
    # CLI subprocess (inside the sandbox) and Phoenix, mapping CLI-native
    # attribute names (input_tokens, tool_name, …) onto OpenInference
    # semantic-convention names so Phoenix can render cost/kind/tool/etc.
    # Config: observability/otel-collector.yaml.
    image: otel/opentelemetry-collector-contrib:0.115.1
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - sandbox-net
      - default
    depends_on:
      - phoenix
    restart: unless-stopped

  phoenix:
    # Arize Phoenix — self-hosted OpenInference UI + OTLP collector.
    # Sandbox containers send spans to http://phoenix:6006/v1/traces;
    # the UI is exposed on the host at localhost:6006 for inspection.
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
    networks:
      - sandbox-net
      - default
    restart: unless-stopped

  egress-proxy:
    # HTTPS CONNECT forward proxy with FQDN allowlist. The claude CLI
    # and any HTTPS client inside the sandbox uses
    # HTTPS_PROXY=http://egress-proxy:8888 to reach api.anthropic.com,
    # api.github.com, etc. The token-injection role lives on
    # broker owns all credentialed external API calls.
    build:
      context: ./sandbox/egress-proxy
    image: agent-sandbox-egress-proxy:latest
    networks:
      - sandbox-net
      - default
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    environment:
      - TEMPORAL_TARGET=temporal:7233
      # Pattern-C: IS_SANDBOX=1 was needed by the pre-SDK bypassPermissions
      # path. Superseded by ClaudeAgentOptions.sandbox (Dec 2025 SDK).
      # The sandbox-net network is project-prefixed by docker-compose;
      # pass the resolved name so provision_sandbox can attach to it.
      - SANDBOX_NETWORK_NAME=${COMPOSE_PROJECT_NAME:-agent-temporal}_sandbox-net
      # HTTPS CONNECT tunnel for sandbox egress (FQDN allowlist).
      # provision_sandbox stamps this into HTTPS_PROXY/HTTP_PROXY.
      - SANDBOX_EGRESS_PROXY_URL=http://egress-proxy:8888
      - CAPABILITY_BROKER_URL=http://capability-broker:8443
      - CAPABILITY_MCP_URL=http://capability-broker:8443/mcp
      - ANTHROPIC_RELAY_URL=http://capability-broker:8443/anthropic
      - BROKER_REGISTRATION_SECRET=${BROKER_REGISTRATION_SECRET}
      - WORKSPACE_ROOT=${WORKSPACE_ROOT}
      - ALLOWED_REPOS=${ALLOWED_REPOS}
      # Pattern-C Worker Versioning: pin in-flight Workflows to the
      # worker version that started them. CI sets $GITHUB_SHA.
      - WORKER_BUILD_ID=${WORKER_BUILD_ID:-dev}
      # OpenInference: provision_sandbox forwards these into the
      # sandbox env so the agent_runner can initialize OTel inside.
      - PHOENIX_COLLECTOR_ENDPOINT=${PHOENIX_COLLECTOR_ENDPOINT:-http://phoenix:6006/v1/traces}
      # Native CLI OTel base endpoint (no /v1/traces suffix — the CLI
      # appends it). Routed via otel-collector which maps CLI-native
      # attribute names onto OpenInference convention before forwarding
      # to Phoenix, so cost / span_kind / tool.name render correctly.
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      - ARIZE_SPACE_ID=${ARIZE_SPACE_ID:-}
      - ARIZE_API_KEY=${ARIZE_API_KEY:-}
      - ARIZE_PROJECT=${ARIZE_PROJECT:-agent-temporal-dev}
    depends_on:
      - temporal
      - sandbox-image
      - capability-broker
      - egress-proxy
    networks:
      - default
    volumes:
      # Dedicated host workspace root. Each untrusted sibling receives
      # only its individual `${WORKSPACE_ROOT}/autofix-*/repo` at `/work`.
      - ${WORKSPACE_ROOT}:${WORKSPACE_ROOT}
      # Per-workflow sandbox: the worker spawns sibling containers via
      # the host's docker daemon. Sock mount = worker has root-equivalent
      # on the host; acceptable for the PoC, NOT for shared infra.
      - /var/run/docker.sock:/var/run/docker.sock

  gateway:
    build: .
    env_file: .env
    environment:
      - TEMPORAL_TARGET=temporal:7233
      - GATEWAY_BOOT=1
      - ALLOWED_REPOS=${ALLOWED_REPOS}
      - APPROVER_LOGINS=${APPROVER_LOGINS}
    depends_on:
      - temporal
    command: ["uv", "run", "uvicorn", "src.gateway.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"

networks:
  sandbox-net:
    driver: bridge
    # Internal-only: containers on this network have NO direct route to
    # the outside. Broker endpoints provide credentialed upstream calls;
    # the optional egress proxy permits only non-credentialed dependencies.
    internal: true

volumes:
  temporal_pg:
