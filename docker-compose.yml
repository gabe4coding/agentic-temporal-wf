services:
  temporal:
    image: temporalio/auto-setup:1.24
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    depends_on:
      - postgres
    ports:
      - "7233:7233"

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_USER=temporal
    volumes:
      - temporal_pg:/var/lib/postgresql/data

  temporal-ui:
    image: temporalio/ui:2.30.1
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      - temporal
    ports:
      - "8233:8080"

  sandbox-image:
    # One-shot service that builds the per-workflow sandbox image. The
    # worker spawns sibling containers from this image via the mounted
    # docker.sock; it does NOT run the image itself.
    build:
      context: ./sandbox
    image: agent-sandbox:latest
    entrypoint: ["true"]
    restart: "no"

  worker:
    build: .
    env_file: .env
    environment:
      - TEMPORAL_TARGET=temporal:7233
      # The claude CLI refuses --dangerously-skip-permissions when run as
      # root unless this env var is set (it acknowledges we're sandboxed).
      - IS_SANDBOX=1
      # The sandbox-net network is project-prefixed by docker-compose;
      # pass the resolved name so provision_sandbox can attach to it.
      - SANDBOX_NETWORK_NAME=${COMPOSE_PROJECT_NAME:-agent-temporal}_sandbox-net
    depends_on:
      - temporal
      - sandbox-image
    networks:
      - default
      - sandbox-net
    volumes:
      # Persist workdirs across container restarts. The workflow's
      # prepare_workdir activity clones into /tmp/autofix-{workflow_id}/repo
      # and later tool calls (read_file, run_pytest, git_commit_and_push)
      # expect the clone to still be there. Without this volume, any restart
      # wipes /tmp and the agent's tool calls fail with ENOENT.
      - worker_tmp:/tmp
      # Per-workflow sandbox: the worker spawns sibling containers via
      # the host's docker daemon. Sock mount = worker has root-equivalent
      # on the host; acceptable for the PoC, NOT for shared infra.
      - /var/run/docker.sock:/var/run/docker.sock

  gateway:
    build: .
    env_file: .env
    environment:
      - TEMPORAL_TARGET=temporal:7233
      - GATEWAY_BOOT=1
    depends_on:
      - temporal
    command: ["uv", "run", "uvicorn", "src.gateway.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"

networks:
  sandbox-net:
    driver: bridge
    # TODO: egress allow-list (github.com, mirror pip). For the PoC the
    # network is unrestricted; tighten before production rollout.

volumes:
  temporal_pg:
  worker_tmp:
