Port 8888
Listen 0.0.0.0
Timeout 60

# Logging — Info covers Connect, deny and forwarded URLs.
# Tinyproxy under `-d` writes to stderr by default; don't set LogFile
# because tinyproxy's symlink check rejects /dev/std{out,err}.
LogLevel Info

# Auth — the sandbox-net is internal-only, so allow any source in the
# network. Don't open this proxy on a public network.
Allow 0.0.0.0/0

# Default-deny + explicit allow-list of FQDNs. See ./filter.
# tinyproxy 1.11+ on Alpine: regex is enabled via FilterExtended
# (FilterType was removed). FilterURLs Off applies the filter to the
# host:port pair rather than the full URL.
FilterDefaultDeny Yes
Filter "/etc/tinyproxy/filter"
FilterURLs Off
FilterExtended Yes
FilterCaseSensitive No

# Allow HTTPS (CONNECT method) only on standard TLS ports.
ConnectPort 443
ConnectPort 80

# Drop the Via header so the agent can't trivially fingerprint the proxy
# from inside the sandbox.
DisableViaHeader Yes
